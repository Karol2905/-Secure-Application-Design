services:

  postgres:
    image: postgres:16-alpine
    container_name: workshop_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-workshopdb}
      POSTGRES_USER:     ${DB_USER:-workshopuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-workshopuser} -d ${DB_NAME:-workshopdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workshop_app
    restart: unless-stopped
    environment:
      DB_URL:               jdbc:postgresql://postgres:5432/${DB_NAME:-workshopdb}
      DB_USER:              ${DB_USER:-workshopuser}
      DB_PASSWORD:          ${DB_PASSWORD}
      DB_DRIVER:            org.postgresql.Driver
      DDL_AUTO:             update
      JWT_SECRET:           ${JWT_SECRET}
      JWT_EXPIRATION_MS:    ${JWT_EXPIRATION_MS:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy



volumes:
  postgres_data:
