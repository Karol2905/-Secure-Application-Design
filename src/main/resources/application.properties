spring.application.name=secure-app-workshop
server.port=8080

# ── Database ──────────────────────────────────────────────────────────────
# Local (sin Docker): H2 en memoria, cero configuración extra.
# Docker:             DB_URL, DB_USER, DB_PASSWORD se inyectan desde .env
#                     a través de docker-compose.yml.
spring.datasource.url=${DB_URL:jdbc:h2:mem:workshopdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── H2 Console (solo dev: http://localhost:8080/h2-console) ──────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ───────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:local-dev-secret-NOT-for-production-must-be-at-least-64-characters-long}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── CORS ──────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost,http://127.0.0.1}

# ── Logging ───────────────────────────────────────────────────────────────
logging.level.com.workshop=DEBUG
logging.level.org.springframework.security=INFO
