cat > src/main/resources/apache/httpd.prod.conf << 'EOF'
ServerRoot "/usr/local/apache2"
Listen 80
Listen 443

LoadModule mpm_event_module      modules/mod_mpm_event.so
LoadModule authz_core_module     modules/mod_authz_core.so
LoadModule log_config_module     modules/mod_log_config.so
LoadModule env_module            modules/mod_env.so
LoadModule headers_module        modules/mod_headers.so
LoadModule rewrite_module        modules/mod_rewrite.so
LoadModule ssl_module            modules/mod_ssl.so
LoadModule socache_shmcb_module  modules/mod_socache_shmcb.so
LoadModule unixd_module          modules/mod_unixd.so
LoadModule dir_module            modules/mod_dir.so
LoadModule mime_module           modules/mod_mime.so

ServerAdmin  webmaster@tdseapache.duckdns.org
ServerName   tdseapache.duckdns.org
ServerTokens Prod
ServerSignature Off
Options -Indexes

TypesConfig conf/mime.types
AddType application/javascript .js
AddType text/css               .css

ErrorLog  /proc/self/fd/2
CustomLog /proc/self/fd/1 combined

SSLStaplingCache shmcb:/usr/local/apache2/logs/ssl_stapling(32768)

<VirtualHost *:80>
    ServerName  tdseapache.duckdns.org
    RewriteEngine On
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName  tdseapache.duckdns.org

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/tdseapache.duckdns.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/tdseapache.duckdns.org/privkey.pem

    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite        ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:\
ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:\
ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305
    SSLHonorCipherOrder   off
    SSLSessionTickets     off
    SSLUseStapling        on

    DocumentRoot /usr/local/apache2/htdocs

    <Directory "/usr/local/apache2/htdocs">
        Options    -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>

    DirectoryIndex index.html

    Header always set Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload"
    Header always set X-Frame-Options            "DENY"
    Header always set X-Content-Type-Options     "nosniff"
    Header always set X-XSS-Protection           "1; mode=block"
    Header always set Referrer-Policy            "strict-origin-when-cross-origin"
</VirtualHost>
EOF